function esc(s){ var d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

// height must land on the cell too - a <tr> alone doesn't reliably size in
// table layout. rounded to whole px so spacers can never drift fractionally.
function setSpacer(tr, px){
  var h = Math.round(px) + 'px';
  tr.style.height = h;
  tr.firstElementChild.style.height = h;
}

function buildHeader(){
  var tr = document.createElement('tr');
  COLS.forEach(function(c, i){
    var th = document.createElement('th');
    th.innerHTML = esc(c) + '<span class="arrow">' + (i===sortCol ? (sortDir===1?'\u25B2':'\u25BC') : '') + '</span>';
    th.onclick = function(){ setSort(i); };
    tr.appendChild(th);
  });
  thead.innerHTML = '';
  thead.appendChild(tr);
}

function numeric(v){
  if (v === '' || v === null) return null;
  var n = parseFloat(String(v).replace(/,/g,''));
  return (!isNaN(n) && isFinite(n) && /^[\s]*[-+$]?[\d,.]+%?[\s]*$/.test(String(v))) ? n : null;
}

function setSort(i){
  if (sortCol === i){ sortDir = (sortDir === 1) ? -1 : 1; } else { sortCol = i; sortDir = 1; }
  view.sort(function(a, b){
    var va = ROWS[a][i], vb = ROWS[b][i];
    var na = numeric(va), nb = numeric(vb);
    var r;
    if (va === '' && vb !== '') return 1;            // empties last, always
    if (vb === '' && va !== '') return -1;
    if (na !== null && nb !== null){ r = na - nb; }
    else { r = String(va).localeCompare(String(vb), undefined, {sensitivity:'base'}); }
    return sortDir * r;
  });
  buildHeader();
  render();
}

function normId(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, ''); }

function looksLikeSql(q){
  return /(<=|>=|!=|<>|=|<|>)/.test(q) || /\b(like|in|and|or|not)\b/i.test(q);

function tokenize(q){
  var re = /\s*(?:(<=|>=|!=|<>|=|<|>|\(|\)|,)|'((?:[^']|'')*)'|"([^"]*)"|([A-Za-z0-9_.%$-]+))/g;

    else if (m[2] !== undefined) toks.push({t:'str', v:m[2].replace(/''/g, "'")});

  }
  if (pos < q.length && q.slice(pos).trim() !== '') return null;
  return toks;

    return n;
  }
  function term(){
    var n = factor();
    while (peek() && peek().t === 'kw' && peek().v === 'and'){ take(); n = {and:[n, factor()]}; }
    return n;
  }
  function factor(){
    var tk = peek();
    if (!tk) throw 0;
    if (tk.t === 'kw' && tk.v === 'not'){ take(); return {not: factor()}; }
    if (tk.t === 'op' && tk.v === '('){ take(); var n = expr(); if (!peek() || peek().v !== ')') throw 0; take(); return n; }
    return predicate();
  }
  function predicate(){
    var c = take();
    if (!c || c.t !== 'word') throw 0;
    var idx = COLIDX[normId(c.v)];
    if (idx === undefined) throw 0;
    var neg = false, tk = peek();
    if (tk && tk.t === 'kw' && tk.v === 'not'){ take(); neg = true; tk = peek(); }
    if (!tk) throw 0;
    if (tk.t === 'kw' && tk.v === 'like'){ take(); var v = value(); return {like:{col:idx, pat:v, neg:neg}}; }
    if (tk.t === 'kw' && tk.v === 'in'){
      take(); if (!peek() || peek().v !== '(') throw 0; take();
      var vals = [value()];
      while (peek() && peek().v === ','){ take(); vals.push(value()); }
      if (!peek() || peek().v !== ')') throw 0; take();
      return {inlist:{col:idx, vals:vals, neg:neg}};
    }
    if (neg) throw 0;
    if (tk.t === 'op' && ['=','!=','<>','<','<=','>','>='].indexOf(tk.v) >= 0){ take(); return {cmp:{col:idx, op:tk.v, val:value()}}; }
    throw 0;
  }
  function value(){
    var tk = take();
    if (!tk || (tk.t !== 'str' && tk.t !== 'word')) throw 0;
    return tk.v;
  }
  var n = expr();
  if (p !== toks.length) throw 0;
  return n;
}

function evalNode(n, row){
  if (n.or) return evalNode(n.or[0], row) || evalNode(n.or[1], row);
  if (n.and) return evalNode(n.and[0], row) && evalNode(n.and[1], row);
  if (n.not) return !evalNode(n.not, row);
  if (n.cmp){
    var cell = String(row[n.cmp.col]), val = String(n.cmp.val);
    var nc = numeric(cell), nv = numeric(val), r;
    if (nc !== null && nv !== null){ r = nc < nv ? -1 : (nc > nv ? 1 : 0); }
    else { var a = cell.toLowerCase(), b = val.toLowerCase(); r = a < b ? -1 : (a > b ? 1 : 0); }
    switch (n.cmp.op){
      case '=': return r === 0;
      case '!=': case '<>': return r !== 0;
      case '<': return r < 0;
      case '<=': return r <= 0;
      case '>': return r > 0;
      case '>=': return r >= 0;
    }
  }
  if (n.like){
    var pat = n.like.pat.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/%/g, '.*').replace(/_/g, '.');
    var hit = new RegExp('^' + pat + '$', 'i').test(String(row[n.like.col]));
    return n.like.neg ? !hit : hit;
  }
  if (n.inlist){
    var cell = String(row[n.inlist.col]).toLowerCase();
    var hit = n.inlist.vals.some(function(v){ return String(v).toLowerCase() === cell; });
    return n.inlist.neg ? !hit : hit;
  }
  return false;
}
// -------------------------------------------------------------------------

function applyFilter(){
  var q = filterBox.value.trim();
  filterBox.classList.remove('bad');
  view = [];
  if (q === ''){
    for (var i = 0; i < ROWS.length; i++) view.push(i);
  } else if (looksLikeSql(q)){
    var ast = null, toks = tokenize(q);
    if (toks){ try { ast = parse(toks); } catch (e) { ast = null; } }
    if (!ast){
      filterBox.classList.add('bad');
      count.textContent = 'bad expression';
      return;                                        // keep current view
    }
    for (var i = 0; i < ROWS.length; i++){ if (evalNode(ast, ROWS[i])) view.push(i); }
  } else {
    var terms = q.toLowerCase().split(/\s+/);
    for (var i = 0; i < ROWS.length; i++){
      var hay = ROWS[i].join('\u0001').toLowerCase();
      var ok = true;
      for (var t = 0; t < terms.length; t++){ if (hay.indexOf(terms[t]) === -1){ ok = false; break; } }
      if (ok) view.push(i);
    }
  }
  if (sortCol >= 0){ var c = sortCol, d = sortDir; sortCol = -1; sortDir = 0; setSort(c); if (d === -1) setSort(c); return; }
  render();
}

function render(){
  var h = wrap.clientHeight;
  var first = Math.max(0, Math.floor(wrap.scrollTop / ROWH) - PAD);
  var last = Math.min(view.length, Math.ceil((wrap.scrollTop + h) / ROWH) + PAD);
  setSpacer(topSpace, first * ROWH);
  setSpacer(botSpace, (view.length - last) * ROWH);
  var html = [];
  for (var v = first; v < last; v++){
    var row = ROWS[view[v]];
    html.push('<tr>');
    for (var c = 0; c < row.length; c++){
      var val = String(row[c]);
      var tmpl = LINKS[c];
      if (tmpl && val !== ''){
        var href = tmpl.replace(/\{([^}]*)\}/g, function(_m, name){
          var raw = (name === '') ? val : String(row[COLIDX_BY_NAME[name]] || '');
          return encodeURIComponent(raw);
        });
        html.push('<td><a href="' + esc(href) + '" target="_blank" rel="noopener">' + esc(val) + '</a></td>');
      } else if (val.length > EXPAND_AT){
        html.push('<td class="expandable" data-r="' + view[v] + '" data-c="' + c + '">' + esc(val) + '</td>');
      } else {
        html.push('<td>' + esc(val) + '</td>');
      }
    }
    html.push('</tr>');
  }
  tbody.innerHTML = html.join('');
  count.textContent = view.length.toLocaleString() + ' of ' + ROWS.length.toLocaleString() + ' rows';
}

// ROWH must match the REAL rendered row height: if it doesn't, the spacer
// heights misreport the total, scrollHeight shifts under the browser on
// every render, it corrects scrollTop, that fires scroll again -> runaway
// scrolling. So measure a real row instead of assuming one.
function calibrate(){
  if (!ROWS.length) return;
  setSpacer(topSpace, 0);
  setSpacer(botSpace, 0);
  var probe = [], row = ROWS[0];
  probe.push('<tr>');
  for (var c = 0; c < row.length; c++){
    var val = String(row[c]);
    probe.push('<td>' + esc(val) + '</td>');
  }
  probe.push('</tr>');
  tbody.innerHTML = probe.join('');
  var tr = tbody.firstElementChild;
  if (tr){
    var h = Math.round(tr.getBoundingClientRect().height);
    if (h > 4) ROWH = h;             // whole px only: fractional rows drift
  }
  tbody.innerHTML = '';
}

// one render per animation frame, no matter how many scroll events arrive
var pending = false;
function scheduleRender(){
  if (pending) return;
  pending = true;
  window.requestAnimationFrame(function(){ pending = false; render(); });
}

wrap.addEventListener('scroll', scheduleRender);
window.addEventListener('resize', function(){ calibrate(); render(); });

var overlay = document.getElementById('overlay');
tbody.addEventListener('click', function(e){
  var td = e.target.closest('td.expandable');
  if (!td) return;
  overlay.querySelector('.box').textContent = ROWS[td.dataset.r][td.dataset.c];
  overlay.style.display = 'flex';
});
overlay.addEventListener('click', function(){ overlay.style.display = 'none'; });
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') overlay.style.display = 'none'; });

buildHeader();
calibrate();
render();
</script>
</body>
